version: 2
updates:
  # npm packages
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      expo:
        patterns:
          - "expo*"
          - "@expo/*"
      supabase:
        patterns:
          - "@supabase/*"
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      vercel:
        patterns:
          - "@vercel/*"
    ignore:
      # Skip major version bumps for Expo — coordinate manually
      - dependency-name: "expo"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
