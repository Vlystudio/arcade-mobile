version: 2
updates:
  # npm packages
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      expo:
        patterns:
          - "expo*"
          - "@expo/*"
      supabase:
        patterns:
          - "@supabase/*"
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      vercel:
        patterns:
          - "@vercel/*"
    ignore:
      # Expo ecosystem must be upgraded together manually via `npx expo install --fix`
      - dependency-name: "expo"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "expo-*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "@expo/*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
