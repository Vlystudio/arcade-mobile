name: Security

on:
  push:
    branches: [master, main, staging, sandbox]
  pull_request:
    branches: [master, main, staging]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build-and-lint:
    name: Type-check, lint & web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx expo lint --max-warnings 0

      - name: Web export (smoke build)
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
          EXPO_PUBLIC_API_BASE_URL: https://placeholder.example.com
          EXPO_PUBLIC_SITE_URL: https://placeholder.example.com

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high/critical, production only)
        run: npm audit --audit-level=high --omit=dev

      - name: Generate SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-format json --output-file sbom.json
        continue-on-error: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: sbom.json
          retention-days: 30

  secret-scan:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    # Semgrep is ADVISORY — findings are uploaded to GitHub Security tab but
    # do not block the build. This is intentional during development: the
    # auto ruleset produces noise on generated/vendored code.
    #
    # ACTION REQUIRED before customer-production launch:
    #   1. Triage all open Semgrep findings in the Security tab.
    #   2. Suppress false positives with inline `# nosemgrep` comments.
    #   3. Remove `continue-on-error: true` from the scan step to make it blocking.
    name: SAST (Semgrep — advisory)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan
        run: semgrep scan --config=auto --sarif --output=semgrep.sarif src/ api/ lib/
        continue-on-error: true  # advisory — see comment above

      # Production gate: HIGH-severity (ERROR) findings are blocking.
      # Lower severities remain advisory via the SARIF upload above.
      - name: Semgrep high-severity gate (blocking)
        run: semgrep scan --config=auto --severity ERROR --error src/ api/ lib/ supabase/functions/

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  dependency-review:
    name: Dependency review (PRs only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
