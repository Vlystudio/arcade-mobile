name: Security

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  security-events: write   # CodeQL / dependency-review
  actions: read

jobs:
  security:
    name: Type-check, lint, and audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: npm audit (high/critical only, production deps)
        run: npm audit --audit-level=high --omit=dev

  dependency-review:
    name: Dependency review (PRs only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          # Deny any package with a known license incompatibility
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

  secret-scan:
    name: Secret scanning check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for accidental secrets in diff
        run: |
          # Fail if any EXPO_PUBLIC_ key that looks like a secret appears in staged files
          # (anon keys are fine; service role keys are not)
          if git diff origin/${{ github.base_ref || 'master' }}...HEAD -- '*.ts' '*.tsx' '*.js' '*.env*' \
            | grep -E 'service_role|SUPABASE_SERVICE_ROLE|SQUARE_ACCESS_TOKEN\s*=' | grep -v '^\-'; then
            echo "::error::Possible secret detected in diff. Check the lines above."
            exit 1
          fi
        continue-on-error: false
